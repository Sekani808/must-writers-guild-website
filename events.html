<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#233D84">
    <meta name="description" content="Discover upcoming and past events from the MUST Writers Guild.">
    <title>Events — MUST Writers Guild</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/logo.png">
    
    <style>
        .events-page {
            padding-bottom: 100px;
        }
        
        .events-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
        }
        
        .events-tab {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        
        .events-tab.active {
            color: var(--primary-blue);
            background: rgba(35, 61, 132, 0.05);
        }
        
        .events-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: var(--primary-blue);
            border-radius: 3px;
        }
        
        .event-category {
            margin-bottom: 8px;
        }
        
        .event-category h3 {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .add-calendar-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--white);
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .add-calendar-btn:hover {
            background: var(--primary-blue);
            color: white;
        }
        
        .empty-events {
            text-align: center;
            padding: 48px 20px;
        }
        
        .empty-events i {
            font-size: 3rem;
            color: var(--border-light);
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="events-page page-transition">
    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill"></i>
    </button>
    
    <div class="container">
        <div class="page-header">
            <h1>Events</h1>
            <p>Workshops, readings, and competitions</p>
        </div>
        
        <!-- Event Tabs -->
        <div class="events-tabs">
            <button class="events-tab active" onclick="switchEventsTab('upcoming')">
                <i class="bi bi-calendar-check"></i> Upcoming
            </button>
            <button class="events-tab" onclick="switchEventsTab('past')">
                <i class="bi bi-calendar-x"></i> Past
            </button>
        </div>
        
        <!-- Events Content -->
        <div id="eventsContent">
            <div class="spinner"></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <ul>
            <li>
                <a href="index.html">
                    <i class="bi bi-house"></i>
                    <span>Home</span>
                </a>
            </li>
            <li>
                <a href="library.html">
                    <i class="bi bi-book"></i>
                    <span>Library</span>
                </a>
            </li>
            <li>
                <a href="events.html" class="active">
                    <i class="bi bi-calendar-event-fill"></i>
                    <span>Events</span>
                </a>
            </li>
            <li>
                <a href="guild.html">
                    <i class="bi bi-people"></i>
                    <span>Guild</span>
                </a>
            </li>
            <li>
                <a href="join.html">
                    <i class="bi bi-person-plus"></i>
                    <span>Join</span>
                </a>
            </li>
        </ul>
    </nav>
    
    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/events.js"></script>
    
    <script>
        let allEvents = [];
        let currentTab = 'upcoming';
        
        async function loadEvents() {
            try {
                const response = await fetch('/data/events.json');
                allEvents = await response.json();
                renderEvents();
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('eventsContent').innerHTML = `
                    <div class="empty-events">
                        <i class="bi bi-wifi-off"></i>
                        <h3>Unable to load events</h3>
                        <p>Check your connection and try again</p>
                    </div>
                `;
            }
        }
        
        function renderEvents() {
            const container = document.getElementById('eventsContent');
            const now = new Date();
            
            const filtered = allEvents.filter(event => {
                const eventDate = new Date(event.date);
                return currentTab === 'upcoming' ? eventDate >= now : eventDate < now;
            });
            
            // Sort by date
            filtered.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return currentTab === 'upcoming' ? dateA - dateB : dateB - dateA;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-events">
                        <i class="bi bi-calendar"></i>
                        <h3>No ${currentTab} events</h3>
                        <p>Check back soon for new events</p>
                    </div>
                `;
                return;
            }
            
            // Group by month
            const grouped = {};
            filtered.forEach(event => {
                const date = new Date(event.date);
                const month = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                if (!grouped[month]) grouped[month] = [];
                grouped[month].push(event);
            });
            
            container.innerHTML = Object.entries(grouped).map(([month, events]) => `
                <div class="event-category">
                    <h3><i class="bi bi-calendar-month"></i> ${month}</h3>
                    ${events.map(event => `
                        <div class="event-card ${currentTab === 'past' ? 'past' : ''}">
                            <div class="date-badge">
                                <i class="bi bi-calendar-event"></i>
                                ${formatDate(event.date)}
                            </div>
                            <h3>${event.title}</h3>
                            <div class="details">
                                <span><i class="bi bi-clock"></i> ${event.time}</span>
                                <span><i class="bi bi-geo-alt"></i> ${event.venue}</span>
                                <span><i class="bi bi-people"></i> ${event.attendees || 'Open to all'}</span>
                            </div>
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px; line-height: 1.6;">
                                ${event.description}
                            </p>
                            ${currentTab === 'upcoming' ? `
                                <button class="add-calendar-btn" onclick="addToCalendar('${event.title}', '${event.date}', '${event.time}', '${event.venue}', '${event.description}')">
                                    <i class="bi bi-calendar-plus"></i> Add to Calendar
                                </button>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
        
        function switchEventsTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.events-tab').forEach(t => {
                t.classList.toggle('active', t.textContent.toLowerCase().includes(tab));
            });
            renderEvents();
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric' 
            });
        }
        
        function addToCalendar(title, date, time, venue, description) {
            const eventDate = new Date(date + 'T' + time);
            const endDate = new Date(eventDate.getTime() + 2 * 60 * 60 * 1000); // 2 hours default
            
            const icsContent = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'BEGIN:VEVENT',
                `DTSTART:${eventDate.toISOString().replace(/[-:]/g, '').split('.')[0]}Z`,
                `DTEND:${endDate.toISOString().replace(/[-:]/g, '').split('.')[0]}Z`,
                `SUMMARY:${title}`,
                `DESCRIPTION:${description}`,
                `LOCATION:${venue}`,
                'END:VEVENT',
                'END:VCALENDAR'
            ].join('\n');
            
            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title.replace(/\s+/g, '_')}.ics`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Event added to calendar');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--deep-navy);
                color: white;
                padding: 12px 24px;
                border-radius: 50px;
                font-size: 0.9rem;
                z-index: 3000;
                animation: fadeInUp 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        // Initialize
        loadEvents();
    </script>
</body>
</html>
