<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#233D84">
    <meta name="description" content="Browse stories and poetry from the MUST Writers Guild library.">
    <title>Library — MUST Writers Guild</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/logo.png">
    
    <style>
        .library-page {
            padding-bottom: 100px;
        }
        
        .library-header {
            padding: 24px 0 16px;
            text-align: center;
        }
        
        .library-header h1 {
            font-size: 1.75rem;
            color: var(--primary-blue);
            margin-bottom: 4px;
        }
        
        .library-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .content-grid {
            display: grid;
            gap: 16px;
        }
        
        .filter-tags {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        
        .filter-tags::-webkit-scrollbar {
            display: none;
        }
        
        .filter-tag {
            padding: 8px 16px;
            background: var(--white);
            border: 2px solid var(--border-light);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        
        .filter-tag.active,
        .filter-tag:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
    </style>
</head>
<body class="library-page page-transition">
    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill"></i>
    </button>
    
    <div class="container">
        <div class="library-header">
            <h1>Library</h1>
            <p>Stories and poetry from our community</p>
        </div>
        
        <!-- Search -->
        <div class="search-bar">
            <i class="bi bi-search"></i>
            <input type="text" id="librarySearch" placeholder="Search titles, authors, genres...">
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="stories" onclick="switchTab('stories')">
                <i class="bi bi-book"></i> Stories
            </button>
            <button class="tab-btn" data-tab="poems" onclick="switchTab('poems')">
                <i class="bi bi-flower1"></i> Poetry
            </button>
        </div>
        
        <!-- Filter Tags -->
        <div class="filter-tags" id="filterTags" style="display: none;">
            <span class="filter-tag active" data-filter="all">All</span>
        </div>
        
        <!-- Content -->
        <div class="content-grid" id="contentGrid">
            <div class="spinner"></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <ul>
            <li>
                <a href="index.html">
                    <i class="bi bi-house"></i>
                    <span>Home</span>
                </a>
            </li>
            <li>
                <a href="library.html" class="active">
                    <i class="bi bi-book-fill"></i>
                    <span>Library</span>
                </a>
            </li>
            <li>
                <a href="events.html">
                    <i class="bi bi-calendar-event"></i>
                    <span>Events</span>
                </a>
            </li>
            <li>
                <a href="guild.html">
                    <i class="bi bi-people"></i>
                    <span>Guild</span>
                </a>
            </li>
            <li>
                <a href="join.html">
                    <i class="bi bi-person-plus"></i>
                    <span>Join</span>
                </a>
            </li>
        </ul>
    </nav>
    
    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/library.js"></script>
    
    <script>
        let currentStories = [];
        let currentPoems = [];
        let activeTab = 'stories';
        
        async function loadLibrary() {
            try {
                const [storiesRes, poemsRes] = await Promise.all([
                    fetch('/data/stories.json'),
                    fetch('/data/poems.json')
                ]);
                
                currentStories = await storiesRes.json();
                currentPoems = await poemsRes.json();
                
                renderContent();
                setupFilters();
            } catch (error) {
                console.error('Error loading library:', error);
                document.getElementById('contentGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-wifi-off"></i>
                        <h3>Unable to load library</h3>
                        <p>Check your connection and try again</p>
                    </div>
                `;
            }
        }
        
        function renderContent(filter = 'all', search = '') {
            const container = document.getElementById('contentGrid');
            const items = activeTab === 'stories' ? currentStories : currentPoems;
            
            let filtered = items;
            
            if (filter !== 'all') {
                const key = activeTab === 'stories' ? 'genre' : 'theme';
                filtered = filtered.filter(item => item[key] === filter);
            }
            
            if (search) {
                filtered = filtered.filter(item => {
                    const text = activeTab === 'stories' 
                        ? `${item.title} ${item.author} ${item.genre}`
                        : `${item.title} ${item.poet} ${item.theme}`;
                    return text.toLowerCase().includes(search.toLowerCase());
                });
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h3>No ${activeTab} found</h3>
                        <p>Try adjusting your search or filters</p>
                    </div>
                `;
                return;
            }
            
            if (activeTab === 'stories') {
                container.innerHTML = filtered.map(story => `
                    <div class="story-card" onclick="window.location.href='reader.html?type=story&id=${story.id}'">
                        <div class="card-header">
                            <span class="genre-tag">${story.genre}</span>
                            <h3>${story.title}</h3>
                            <div class="meta">
                                <span><i class="bi bi-person"></i> ${story.author}</span>
                                <span><i class="bi bi-calendar"></i> ${story.date}</span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="read-time"><i class="bi bi-clock"></i> ${story.readTime}</span>
                            <span class="read-btn">Read <i class="bi bi-arrow-right"></i></span>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = filtered.map(poem => `
                    <div class="poem-card" onclick="window.location.href='reader.html?type=poem&id=${poem.id}'">
                        <h3>${poem.title}</h3>
                        <p class="poet">by ${poem.poet}</p>
                        <span class="theme">${poem.theme}</span>
                        <p class="preview">${poem.preview || poem.content.substring(0, 120)}...</p>
                    </div>
                `).join('');
            }
        }
        
        function switchTab(tab) {
            activeTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            
            renderContent();
            setupFilters();
        }
        
        function setupFilters() {
            const items = activeTab === 'stories' ? currentStories : currentPoems;
            const key = activeTab === 'stories' ? 'genre' : 'theme';
            const categories = [...new Set(items.map(item => item[key]))];
            
            const container = document.getElementById('filterTags');
            container.style.display = categories.length > 1 ? 'flex' : 'none';
            
            container.innerHTML = `
                <span class="filter-tag active" data-filter="all" onclick="applyFilter('all')">All</span>
                ${categories.map(cat => `
                    <span class="filter-tag" data-filter="${cat}" onclick="applyFilter('${cat}')">${cat}</span>
                `).join('')}
            `;
        }
        
        function applyFilter(filter) {
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.toggle('active', tag.dataset.filter === filter);
            });
            
            const search = document.getElementById('librarySearch').value;
            renderContent(filter, search);
        }
        
        // Search functionality
        document.getElementById('librarySearch').addEventListener('input', (e) => {
            const activeFilter = document.querySelector('.filter-tag.active')?.dataset.filter || 'all';
            renderContent(activeFilter, e.target.value);
        });
        
        // Initialize
        loadLibrary();
    </script>
</body>
</html>
